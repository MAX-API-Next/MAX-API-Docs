services:
  max-api-docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:33301}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
    image: max-api-docs:local
    container_name: max-api-docs
    restart: unless-stopped
    init: true
    ports:
      - '${DOCS_PORT:-33301}:33301'
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:33301}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
      INKEEP_API_KEY: ${INKEEP_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-inkeep-qa-sonnet-4}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.inkeep.com/v1}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:33301/zh').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - max-api-docs-network

networks:
  max-api-docs-network:
    driver: bridge
